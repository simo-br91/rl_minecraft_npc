# ---------------------------------------------------------------
# Experiment: Navigation with shaped rewards  (primary baseline)
# ---------------------------------------------------------------
experiment_name: nav_shaped

# Task
task: navigation
reward_type: shaped        # "shaped" | "sparse"

# Curriculum
curriculum: false          # no curriculum: use fixed difficulty
min_dist: 7.0              # target distance range (blocks)
max_dist: 14.0
num_obstacles: 2           # 1-block-high stone wall obstacles on the path

# Episode budget
total_timesteps: 200000

# PPO hyperparameters
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.05
clip_range: 0.2
net_arch: [256, 256]

# Output paths
checkpoint_name: nav_shaped_run1
monitor_log: nav_shaped_monitor.csv
success_log: nav_shaped_success.csv
