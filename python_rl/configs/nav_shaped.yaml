experiment_name: nav_shaped
task: navigation
reward_type: shaped
curriculum: false
min_dist: 7.0
max_dist: 14.0
num_obstacles: 2
total_timesteps: 200000

# ---- Hyperparameters (Issue 6.5) ----
# Source: SB3 PPO reference defaults.  ent_coef raised 0.01→0.05 to
# maintain exploration on the shaped reward task.
# To tune automatically with Optuna (30 trials, 50k steps each):
#   python -m python_rl.train.hyperparameter_search --task navigation --trials 30
# Results are saved to python_rl/logs/optuna/navigation_best_params.yaml
# and can be copied here to override.
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.05
clip_range: 0.2
net_arch: [256, 256]

checkpoint_name: nav_shaped_run1
monitor_log: nav_shaped_monitor.csv
success_log: nav_shaped_success.csv