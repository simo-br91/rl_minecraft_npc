# Unified multitask agent: navigate + farm + combat + eat in one episode.
# Agent must judge the situation and adapt its behavior.
experiment_name: multitask
task: multitask
reward_type: shaped
num_crops: 5
full_farm_cycle: false
total_timesteps: 500000
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 2.5e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.04
clip_range: 0.2
net_arch: [256, 256]
checkpoint_name: multitask_run1
monitor_log: multitask_monitor.csv
success_log: multitask_success.csv