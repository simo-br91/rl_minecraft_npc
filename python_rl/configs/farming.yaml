experiment_name: farming
task: farming
reward_type: shaped
curriculum: false
num_crops: 5
full_farm_cycle: false
total_timesteps: 400000

# ---- Hyperparameters (Issue 6.5) ----
# learning_rate reduced 3e-4→2e-4 vs navigation: farming has a denser
# reward signal (per-crop bonuses) so a lower LR prevents overshooting in
# value function updates.
# Higher budget (400k) accounts for multi-crop episode complexity.
# To tune automatically:
#   python -m python_rl.train.hyperparameter_search --task farming --trials 20
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 2.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.05
clip_range: 0.2
net_arch: [256, 256]

checkpoint_name: farm_run1
monitor_log: farm_monitor.csv
success_log: farm_success.csv