# ---------------------------------------------------------------
# Experiment: Navigation with curriculum learning  (comparison)
# ---------------------------------------------------------------
# Purpose: compare convergence speed and final difficulty reached
# against the fixed-difficulty baseline (nav_shaped.yaml).
# ---------------------------------------------------------------
experiment_name: nav_curriculum

# Task
task: navigation
reward_type: shaped

# Curriculum
curriculum: true
advance_threshold: 0.70    # rolling success rate needed to advance level
advance_window: 20         # episodes in the rolling window

# Curriculum levels  (managed by CurriculumScheduler)
#
#   Level  min_dist  max_dist  obstacles  description
#   -----  --------  --------  ---------  -----------
#     1      3.0       6.0         0      short, flat
#     2      5.0       9.0         1      medium, 1 obstacle
#     3      7.0      14.0         2      long, 2 obstacles
#     4     10.0      18.0         3      very long, 3 obstacles
curriculum_start_level: 1

# Episode budget  (more than shaped to allow curriculum to progress)
total_timesteps: 250000

# PPO hyperparameters  (same as shaped for fair comparison)
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.05
clip_range: 0.2
net_arch: [256, 256]

# Output paths
checkpoint_name: nav_curriculum_run1
monitor_log: nav_curriculum_monitor.csv
success_log: nav_curriculum_success.csv
level_log: nav_curriculum_levels.csv
