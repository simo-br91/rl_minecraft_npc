experiment_name: nav_curriculum
task: navigation
reward_type: shaped
curriculum: true
advance_threshold: 0.70   # advance when rolling SR ≥ 70% over 20 episodes
regress_threshold: 0.40   # regress when rolling SR ≤ 40% over 20 episodes
advance_window: 20
curriculum_start_level: 1
total_timesteps: 250000

# ---- Hyperparameters (Issue 6.5) ----
# Same as nav_shaped — curriculum manages difficulty; no change needed
# to the PPO hyperparameters.  Higher budget (250k vs 200k) accounts for
# the time spent at early curriculum levels.
# To tune automatically:
#   python -m python_rl.train.hyperparameter_search --task navigation --trials 30
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.05
clip_range: 0.2
net_arch: [256, 256]

checkpoint_name: nav_curriculum_run1
monitor_log: nav_curriculum_monitor.csv
success_log: nav_curriculum_success.csv
level_log: nav_curriculum_levels.csv