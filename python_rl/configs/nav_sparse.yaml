# ---------------------------------------------------------------
# Experiment: Navigation with sparse rewards  (comparison)
# ---------------------------------------------------------------
# Purpose: compare convergence speed and final performance
# against the shaped-reward baseline (nav_shaped.yaml).
# ---------------------------------------------------------------
experiment_name: nav_sparse

# Task
task: navigation
reward_type: sparse        # terminal-only: +10 success, -0.01/step

# Curriculum
curriculum: false
min_dist: 7.0
max_dist: 14.0
num_obstacles: 2

# Episode budget  (same as shaped for fair comparison)
total_timesteps: 200000

# PPO hyperparameters
# NOTE: ent_coef is higher than shaped — sparse rewards require more
#       exploration to stumble on the first success signal.
n_steps: 2048
batch_size: 256
n_epochs: 10
learning_rate: 3.0e-4
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.10             # ↑ exploration for sparse
clip_range: 0.2
net_arch: [256, 256]

# Output paths
checkpoint_name: nav_sparse_run1
monitor_log: nav_sparse_monitor.csv
success_log: nav_sparse_success.csv
